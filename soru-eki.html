<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkish Quiz - Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --turkish: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; }
        
        .nav { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .rule-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fffbe6; font-size: 12px; border: 1px solid #ffe58f; }
        .rule-table td { padding: 8px; text-align: center; border: 1px solid #ffe58f; }
        .red { color: var(--turkish); font-weight: bold; font-size: 15px; }

        .word-card { background: #f9f9f9; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; text-align: center; font-size: 30px; font-weight: bold; color: var(--dark); margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { padding: 16px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; outline: none; }
        
        #fb { text-align: center; margin-top: 15px; font-weight: bold; height: 24px; font-size: 18px; }
        
        #starter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .btn-go { padding: 20px 40px; font-size: 24px; background: var(--green); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        
        .footer-contact { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .wa-link { color: var(--green); text-decoration: none; font-weight: 800; font-size: 16px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<!-- SESİ AÇMAK İÇİN GİRİŞ EKRANI -->
<div id="starter">
    <h2>Turkish Voice Quiz</h2>
    <p>Practice with Teacher Fatih's Voice</p>
    <button class="btn-go" onclick="startQuiz()">🔊 START</button>
</div>

<div class="quiz-card">
    <div class="nav">
        <a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">🏠 HOME</a>
        <b id="prog">1 / 12</b>
    </div>
    
    <table class="rule-table">
        <tr><td>a, ı → <span class="red">mı</span></td><td>e, i → <span class="red">mi</span></td><td>o, u → <span class="red">mu</span></td><td>ö, ü → <span class="red">mü</span></td></tr>
    </table>

    <div id="quiz-ui">
        <div class="word-card" id="box" onclick="playVoice()">
            ...
            <div style="font-size:12px; color:#aaa; font-weight:normal; margin-top:10px;">🔊 Click to hear me</div>
        </div>
        <div class="grid">
            <button class="btn-opt" onclick="check('mı')">mı</button>
            <button class="btn-opt" onclick="check('mi')">mi</button>
            <button class="btn-opt" onclick="check('mu')">mu</button>
            <button class="btn-opt" onclick="check('mü')">mü</button>
        </div>
        <div id="fb"></div>
    </div>

    <div id="done" style="display:none; padding:30px 0;">
        <h2 style="color:var(--green)">Tebrikler! 🎉</h2>
        <p>You finished the quiz!</p>
        <button onclick="location.reload()" style="background:var(--blue); color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer;">Restart</button>
    </div>

    <div class="footer-contact">
        <span style="font-size:13px; color:#7f8c8d;">Questions? Private lessons?</span>
        <a href="https://wa.me/905054466760" target="_blank" class="wa-link">🟢 WhatsApp: +90 505 446 67 60</a>
    </div>
</div>
