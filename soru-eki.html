<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkish Quiz - Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center;}
        .rule-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fffbe6; font-size: 12px; border: 1px solid #ffe58f; }
        .rule-table td { padding: 8px; text-align: center; border: 1px solid #ffe58f; }
        .red { color: #e74c3c; font-weight: bold; font-size: 15px; }
        .word-card { background: #f9f9f9; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; text-align: center; font-size: 30px; font-weight: bold; color: var(--dark); margin-bottom: 20px; cursor: pointer; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { padding: 16px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; }
        #fb { text-align: center; margin-top: 15px; font-weight: bold; height: 24px; font-size: 18px; }
        #starter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
        .btn-go { padding: 20px 40px; font-size: 24px; background: var(--green); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- SESİ AKTİF ETMEK İÇİN GİRİŞ EKRANI -->
<div id="starter">
    <h2 style="color:var(--dark)">Fatih Hoca Turkish Lessons</h2>
    <p>Please click to start and hear my voice</p>
    <button class="btn-go" onclick="unlockAudio()">🔊 START TEST</button>
    <p id="load-status" style="font-size:12px; color:gray;">Loading sound file...</p>
</div>

<div class="quiz-card">
    <div style="text-align:left; margin-bottom:10px;"><a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">← HOME</a></div>
    
    <table class="rule-table">
        <tr><td>a, ı → <span class="red">mı</span></td><td>e, i → <span class="red">mi</span></td><td>o, u → <span class="red">mu</span></td><td>ö, ü → <span class="red">mü</span></td></tr>
    </table>

    <div id="quiz-ui">
        <div class="word-card" id="box" onclick="playVoice()">...</div>
        <div class="grid">
            <button class="btn-opt" onclick="check('mı')">mı</button>
            <button class="btn-opt" onclick="check('mi')">mi</button>
            <button class="btn-opt" onclick="check('mu')">mu</button>
            <button class="btn-opt" onclick="check('mü')">mü</button>
        </div>
        <div id="fb"></div>
    </div>

    <div id="done" style="display:none; padding:30px 0;">
        <h2 style="color:var(--green)">Tebrikler! 🎉</h2>
        <p>You mastered the ı/i distinction!</p>
        <button onclick="location.reload()" style="background:var(--blue); color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold;">Restart</button>
    </div>
</div>

<script>
    // SES DOSYASININ TAM ADRESİNİ YAZDIK (Hata payını sildik)
    const audioFile = new Audio('https://fmemo75-prog.github.io/turkce-ders/audio/all_questions.mp4');
    
    // Ses yüklendiğinde kullanıcıya haber ver
    audioFile.oncanplaythrough = () => {
        document.getElementById('load-status').innerText = "Sound file ready! ✅";
        document.getElementById('load-status').style.color = "green";
    };

    // Sizin kağıttaki saniyeleriniz
    const dataList = [
        { t: 4, w: "O ev", a: "mi", i: "🏠" }, { t: 9, w: "Kitap yeni", a: "mi", i: "📖" },
        { t: 13, w: "Limon ekşi", a: "mi", i: "🍋" }, { t: 20, w: "Hava soğuk", a: "mu", i: "❄️" },
        { t: 22, w: "Bu kutu", a: "mu", i: "📦" }, { t: 26, w: "O doktor", a: "mu", i: "👨‍⚕️" },
        { t: 29, w: "Okul büyük", a: "mü", i: "🏫" }, { t: 33, w: "Çay sıcak", a: "mı", i: "☕" },
        { t: 38, w: "Gözlük pahalı", a: "mı", i: "👓" }, { t: 40, w: "Üzüm tatlı", a: "mı", i: "🍇" },
        { t: 44, w: "O kedi", a: "mi", i: "🐱" }, { t: 46, w: "Defter açık", a: "mı", i: "📔" },
        { t: 49, w: "Süt soğuk", a: "mu", i: "🥛" }, { t: 50, w: "Kapı kapalı", a: "mı", i: "🚪" }
    ];

    let current = 0;
    let pool = [];

    function unlockAudio() {
        // İlk dokunuşta sesi oynatıp hemen durduruyoruz (Kilidi açar)
        audioFile.play().then(() => {
            audioFile.pause();
            document.getElementById('starter').style.display = 'none';
            start();
        }).catch(e => {
            document.getElementById('starter').style.display = 'none';
            start();
        });
    }

    function start() {
        pool = [...dataList].sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        if (current >= pool.length) {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('done').style.display = 'block';
            return;
        }
        const item = pool[current];
        const box = document.getElementById('box');
        box.classList.remove('win');
        box.innerHTML = `${item.w} ${item.i} ...?<br><small style="font-size:12px;color:gray;">🔊 Click to hear my voice</small>`;
        document.getElementById('fb').innerText = "";
    }

    function playVoice() {
        const item = pool[current];
        audioFile.currentTime = item.t;
        audioFile.play();
        // Saniyeyi 2 saniyeye çıkardım ki cümleniz tam duyulsun
        setTimeout(() => { audioFile.pause(); }, 2000); 
    }

    function check(ans) {
        if (ans === pool[current].a) {
            document.getElementById('fb').style.color = "var(--green)";
            document.getElementById('fb').innerText = "Doğru! ✅";
            document.getElementById('box').classList.add('win');
            document.getElementById('box').innerHTML = pool[current].w + " " + pool[current].a + " " + pool[current].i;
            playVoice();
            current++;
            setTimeout(render, 2500);
        } else {
            document.getElementById('fb').style.color = "red";
            document.getElementById('fb').innerText = "Wrong! ❌";
        }
    }
</script>
</body>
</html>
