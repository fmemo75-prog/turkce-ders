<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkish Quiz - Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; box-sizing: border-box;}
        .nav { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .rule-card { width: 100%; background: #fffbe6; border: 1px solid #ffe58f; margin-bottom: 15px; font-size: 12px; text-align: center; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .red { color: #e74c3c; font-weight: bold; font-size: 16px; }
        .word-card { background: #f8f9fa; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; text-align: center; font-size: 32px; font-weight: bold; color: var(--dark); margin-bottom: 20px; cursor: pointer; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { padding: 15px; font-size: 22px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; transition: 0.2s; }
        #fb { text-align:center; margin-top:15px; font-weight:bold; height:20px; font-size:18px; }
        #starter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .btn-go { padding: 20px 40px; font-size: 24px; background: var(--green); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        
        /* HER SAYFAYA STANDART İLETİŞİM ALANI */
        .footer-contact { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .wa-btn { display: inline-block; color: white; background: var(--green); padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 15px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2); }
    </style>
</head>
<body>

<div id="starter">
    <h2>Turkish Voice Quiz</h2>
    <p>By Fatih Mehmet CANITEZ</p>
    <button class="btn-go" onclick="startQuiz()">🔊 START</button>
</div>

<div class="quiz-card">
    <div class="nav"><a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">🏠 HOME</a><b id="count">1 / 13</b></div>
    <div class="rule-card">Vowels: <b>a, ı → <span class="red">mı</span></b> | <b>e, i → <span class="red">mi</span></b> | <b>o, u → <span class="red">mu</span></b> | <b>ö, ü → <span class="red">mü</span></b></div>
    
    <div id="quiz-content">
        <div class="word-card" id="word-box" onclick="playCurrentVoice()">...<br><small style="font-size:12px; color:#aaa; font-weight:normal;">🔊 Click to hear Fatih Hoca</small></div>
        <div class="grid">
            <button class="opt" onclick="check('mı')">mı</button>
            <button class="opt" onclick="check('mi')">mi</button>
            <button class="opt" onclick="check('mu')">mu</button>
            <button class="opt" onclick="check('mü')">mü</button>
        </div>
        <div id="fb"></div>
    </div>

    <div id="finish" style="display:none; text-align:center; padding:30px 0;">
        <h2 style="color:var(--green);">Tebrikler! 🎉</h2>
        <p>You completed the exercise.</p>
        <button class="btn-go" onclick="location.reload()">Restart</button>
    </div>

    <div class="footer-contact">
        <p style="margin-bottom:10px; font-size:13px; color:#7f8c8d;">Questions? Private lessons?</p>
        <a href="https://wa.me/905054466760" target="_blank" class="wa-btn">💬 WhatsApp: Fatih Hoca</a>
    </div>
</div>

<script>
    const items = [
        { file: "PTT-20260325-WA0022.opus", w: "Kitap yeni", a: "mi", i: "📖" },
        { file: "PTT-20260325-WA0023.opus", w: "Limon ekşi", a: "mi", i: "🍋" },
        { file: "PTT-20260325-WA0024.opus", w: "Hava soğuk", a: "mu", i: "❄️" },
        { file: "PTT-20260325-WA0025.opus", w: "Bu kutu", a: "mu", i: "📦" },
        { file: "PTT-20260325-WA0026.opus", w: "O doktor", a: "mu", i: "👨‍⚕️" },
        { file: "PTT-20260325-WA0027.opus", w: "Okul büyük", a: "mü", i: "🏫" },
        { file: "PTT-20260325-WA0028.opus", w: "Çay sıcak", a: "mı", i: "☕" },
        { file: "PTT-20260325-WA0029.opus", w: "Gözlük pahalı", a: "mı", i: "👓" },
        { file: "PTT-20260325-WA0030.opus", w: "Üzüm tatlı", a: "mı", i: "🍇" },
        { file: "PTT-20260325-WA0031.opus", w: "O kedi", a: "mi", i: "🐱" },
        { file: "PTT-20260325-WA0032.opus", w: "Defter açık", a: "mı", i: "📔" },
        { file: "PTT-20260325-WA0033.opus", w: "Süt soğuk", a: "mu", i: "🥛" }
    ];
    let step = 0;

    function startQuiz() {
        document.getElementById('starter').style.display = 'none';
        render();
    }

    function render() {
        if (step >= items.length) {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('finish').style.display = 'block';
            return;
        }
        const item = items[step];
        const wb = document.getElementById('word-box');
        wb.classList.remove('win');
        wb.innerHTML = `${item.w} ${item.i} ...?<br><small style="font-size:12px;color:gray;">🔊 Listen</small>`;
        document.getElementById('count').innerText = `${step + 1} / ${items.length}`;
        document.getElementById('fb').innerText = "";
    }

    function playCurrentVoice() {
        const item = items[step];
        let audio = new Audio('https://fmemo75-prog.github.io/turkce-ders/audio/' + item.file);
        audio.play().catch(e => console.log("Hata"));
    }

    function check(ans) {
        if (ans === items[step].a) {
            document.getElementById('fb').style.color = "var(--green)";
            document.getElementById('fb').innerText = "Correct! ✅";
            document.getElementById('word-box').classList.add('win');
            document.getElementById('word-box').innerHTML = `${items[step].w} ${items[step].a} ${items[step].i}`;
            playCurrentVoice();
            step++; setTimeout(render, 2200);
        } else {
            document.getElementById('fb').style.color = "red";
            document.getElementById('fb').innerText = "Wrong! ❌";
        }<!-- Diğer kodlar aynı, sadece footer-contact bölümünü güncelliyorum -->
    <div class="footer-contact">
        <p style="margin-bottom:5px; font-size:13px; color:#7f8c8d;">Questions? Contact Fatih Hoca:</p>
        <a href="https://wa.me/905054466760" target="_blank" style="text-decoration:none; color:#27ae60; font-weight:bold; font-size:17px;">
            🟢 WhatsApp: +90 505 446 67 60
        </a>
    </div>
    }
</script>
</body>
</html>
