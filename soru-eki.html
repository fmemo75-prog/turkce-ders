<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkish Quiz - Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center;}
        .rule-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fffbe6; font-size: 12px; border: 1px solid #ffe58f; }
        .rule-table td { padding: 8px; text-align: center; border: 1px solid #ffe58f; }
        .red { color: #e74c3c; font-weight: bold; font-size: 15px; }
        .word-card { background: #f9f9f9; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; text-align: center; font-size: 30px; font-weight: bold; color: var(--dark); margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { padding: 16px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; }
        #fb { text-align: center; margin-top: 15px; font-weight: bold; height: 24px; font-size: 18px; }
        #starter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .btn-go { padding: 20px 40px; font-size: 24px; background: var(--green); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="starter">
    <h2>Fatih Hoca Turkish Lessons</h2>
    <p>Voice interaction enabled</p>
    <button class="btn-go" onclick="startQuiz()">🔊 START QUIZ</button>
</div>

<div class="quiz-card">
    <div style="text-align:left; margin-bottom:10px;"><a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">← HOME</a></div>
    
    <table class="rule-table">
        <tr><td>a, ı → <span class="red">mı</span></td><td>e, i → <span class="red">mi</span></td><td>o, u → <span class="red">mu</span></td><td>ö, ü → <span class="red">mü</span></td></tr>
    </table>

    <div id="quiz-ui">
        <div class="word-card" id="box" onclick="playCurrentVoice()">...</div>
        <div class="grid">
            <button class="opt" onclick="check('mı')">mı</button>
            <button class="opt" onclick="check('mi')">mi</button>
            <button class="opt" onclick="check('mu')">mu</button>
            <button class="opt" onclick="check('mü')">mü</button>
        </div>
        <div id="fb"></div>
    </div>

    <div id="done" style="display:none; padding:30px 0;">
        <h2 style="color:var(--green)">Tebrikler! 🎉</h2>
        <p>You completed the exercise!</p>
        <button onclick="location.reload()" style="background:var(--blue); color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer;">Restart</button>
    </div>
</div>

<script>
    // SES LİSTESİ (WA0021 ATLANDI, DİĞERLERİ EŞLENDİ)
    const dataList = [
        { file: "PTT-20260325-WA0022.opus", w: "Kitap yeni", a: "mi", i: "📖" },
        { file: "PTT-20260325-WA0023.opus", w: "Limon ekşi", a: "mi", i: "🍋" },
        { file: "PTT-20260325-WA0024.opus", w: "Hava soğuk", a: "mu", i: "❄️" },
        { file: "PTT-20260325-WA0025.opus", w: "Bu kutu", a: "mu", i: "📦" },
        { file: "PTT-20260325-WA0026.opus", w: "O doktor", a: "mu", i: "👨‍⚕️" },
        { file: "PTT-20260325-WA0027.opus", w: "Okul büyük", a: "mü", i: "🏫" },
        { file: "PTT-20260325-WA0028.opus", w: "Çay sıcak", a: "mı", i: "☕" },
        { file: "PTT-20260325-WA0029.opus", w: "Gözlük pahalı", a: "mı", i: "👓" },
        { file: "PTT-20260325-WA0030.opus", w: "Üzüm tatlı", a: "mı", i: "🍇" },
        { file: "PTT-20260325-WA0031.opus", w: "O kedi", a: "mi", i: "🐱" },
        { file: "PTT-20260325-WA0032.opus", w: "Defter açık", a: "mı", i: "📔" },
        { file: "PTT-20260325-WA0033.opus", w: "Süt soğuk", a: "mu", i: "🥛" }
    ];

    let current = 0; let pool = [];

    function startQuiz() {
        document.getElementById('starter').style.display = 'none';
        // Soruları karıştırıyoruz
        pool = [...dataList].sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        if (current >= pool.length) {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('done').style.display = 'block';
            return;
        }
        const item = pool[current];
        const box = document.getElementById('box');
        box.classList.remove('win');
        box.innerHTML = `${item.w} ${item.i} ...?<br><small style="font-size:12px;color:gray;">🔊 Click to hear</small>`;
        document.getElementById('fb').innerText = "";
    }

    function playCurrentVoice() {
        const item = pool[current];
        let audio = new Audio('https://fmemo75-prog.github.io/turkce-ders/audio/' + item.file);
        audio.play().catch(e => console.log("Audio Error"));
    }

    function check(ans) {
        if (ans === pool[current].a) {
            document.getElementById('fb').style.color = "var(--green)";
            document.getElementById('fb').innerText = "Doğru! ✅";
            document.getElementById('box').classList.add('win');
            document.getElementById('box').innerHTML = pool[current].w + " " + pool[current].a + " " + pool[current].i;
            
            playCurrentVoice();
            current++;
            setTimeout(render, 2200);
        } else {
            document.getElementById('fb').style.color = "red";
            document.getElementById('fb').innerText = "Wrong! ❌";
        }
    }
</script>
</body>
</html>
