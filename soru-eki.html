<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkish Quiz - Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center;}
        .nav { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .rule-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fffbe6; font-size: 12px; border: 1px solid #ffe58f; }
        .rule-table td { padding: 8px; text-align: center; border: 1px solid #ffe58f; }
        .red { color: #e74c3c; font-weight: bold; font-size: 15px; }
        .word-card { background: #f9f9f9; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; text-align: center; font-size: 30px; font-weight: bold; color: var(--dark); margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { padding: 16px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; }
        #fb { text-align: center; margin-top: 15px; font-weight: bold; height: 24px; font-size: 18px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="nav">
        <a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">← HOME</a>
        <b id="prog">1 / 14</b>
    </div>
    
    <table class="rule-table">
        <tr><td>a, ı → <span class="red">mı</span></td><td>e, i → <span class="red">mi</span></td><td>o, u → <span class="red">mu</span></td><td>ö, ü → <span class="red">mü</span></td></tr>
    </table>

    <div id="quiz-ui">
        <div class="word-card" id="box" onclick="playVoice()">
            Yükleniyor...
        </div>
        <div class="grid">
            <button class="btn-opt" onclick="check('mı')">mı</button>
            <button class="btn-opt" onclick="check('mi')">mi</button>
            <button class="btn-opt" onclick="check('mu')">mu</button>
            <button class="btn-opt" onclick="check('mü')">mü</button>
        </div>
        <div id="fb"></div>
    </div>

    <div id="done" style="display:none; padding:30px 0;">
        <h2 style="color:var(--green)">Tebrikler! 🎉</h2>
        <p>You completed the quiz with Fatih Hoca's voice!</p>
        <button onclick="location.reload()" style="background:var(--blue); color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold;">Restart</button>
    </div>
</div>

<script>
    // Ses dosyası yolu
    const audioFile = new Audio('audio/all_questions.mp4');

    // Soru listesi ve saniyeler
    const data = [
        { t: 0, w: "O ev", a: "mi", i: "🏠" },
        { t: 1, w: "Kitap yeni", a: "mi", i: "📖" },
        { t: 2, w: "Limon ekşi", a: "mi", i: "🍋" },
        { t: 4, w: "Hava soğuk", a: "mu", i: "❄️" },
        { t: 5, w: "Bu kutu", a: "mu", i: "📦" },
        { t: 6, w: "O doktor", a: "mu", i: "👨‍⚕️" },
        { t: 7, w: "Okul büyük", a: "mü", i: "🏫" },
        { t: 8, w: "Çay sıcak", a: "mı", i: "☕" },
        { t: 9, w: "Gözlük pahalı", a: "mı", i: "👓" },
        { t: 10, w: "Üzüm tatlı", a: "mı", i: "🍇" },
        { t: 11, w: "O kedi", a: "mi", i: "🐱" },
        { t: 12, w: "Defter açık", a: "mı", i: "📔" },
        { t: 13, w: "Süt soğuk", a: "mu", i: "🥛" },
        { t: 14, w: "Kapı kapalı", a: "mı", i: "🚪" }
    ];

    let step = 0;
    let pool = [];

    function init() {
        pool = [...data].sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        if (step >= pool.length) {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('done').style.display = 'block';
            return;
        }
        const item = pool[step];
        const box = document.getElementById('box');
        box.classList.remove('win');
        box.innerHTML = item.w + " " + item.i + " ...?<br><small style='font-size:12px; color:gray; font-weight:normal;'>🔊 Click to hear</small>";
        document.getElementById('prog').innerText = (step + 1) + " / " + pool.length;
        document.getElementById('fb').innerText = "";
    }

    function playVoice() {
        try {
            audioFile.currentTime = pool[step].t;
            audioFile.play();
            setTimeout(() => { audioFile.pause(); }, 1400);
        } catch(e) { console.log("Audio play error"); }
    }

    function check(ans) {
        if (ans === pool[step].a) {
            document.getElementById('fb').style.color = "var(--green)";
            document.getElementById('fb').innerText = "Doğru! ✅";
            document.getElementById('box').classList.add('win');
            document.getElementById('box').innerHTML = pool[step].w + " " + pool[step].a + " " + pool[step].i;
            
            playVoice();
            step++;
            setTimeout(render, 1800);
        } else {
            document.getElementById('fb').style.color = "red";
            document.getElementById('fb').innerText = "Yanlış! ❌";
        }
    }

    init();
</script>
</body>
</html>
