<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Quiz - Fatih Hoca</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 20px; }
        .card { max-width: 500px; background: white; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .word-card { background: #f9f9f9; border: 2px dashed var(--blue); padding: 40px 10px; border-radius: 15px; font-size: 30px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .word-card.win { background: #e8f8f0; border-color: var(--green); color: var(--green); border-style: solid; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { padding: 16px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <p><a href="index.html">← Geri Dön</a> | Soru: <span id="prog">1 / 14</span></p>
        <div id="quiz-ui">
            <div class="word-card" id="box" onclick="playVoice()">...</div>
            <div class="grid">
                <button class="btn-opt" onclick="check('mı')">mı</button>
                <button class="btn-opt" onclick="check('mi')">mi</button>
                <button class="btn-opt" onclick="check('mu')">mu</button>
                <button class="btn-opt" onclick="check('mü')">mü</button>
            </div>
            <p id="fb" style="font-weight:bold; height:20px; margin-top:20px;"></p>
        </div>
        <div id="done" style="display:none;">
            <h2>Tebrikler! 🎉</h2>
            <button onclick="location.reload()">Tekrar Başla</button>
        </div>
    </div>

    <script>
        const audioFile = new Audio('audio/all_questions.mp4');
        const data = [
            { t: 0, w: "O ev", a: "mi", i: "🏠" }, { t: 1, w: "Kitap yeni", a: "mi", i: "📖" },
            { t: 2, w: "Limon ekşi", a: "mi", i: "🍋" }, { t: 4, w: "Hava soğuk", a: "mu", i: "❄️" },
            { t: 5, w: "Bu kutu", a: "mu", i: "📦" }, { t: 6, w: "O doktor", a: "mu", i: "👨‍⚕️" },
            { t: 7, w: "Okul büyük", a: "mü", i: "🏫" }, { t: 8, w: "Çay sıcak", a: "mı", i: "☕" },
            { t: 9, w: "Gözlük pahalı", a: "mı", i: "👓" }, { t: 10, w: "Üzüm tatlı", a: "mı", i: "🍇" },
            { t: 11, w: "O kedi", a: "mi", i: "🐱" }, { t: 12, w: "Defter açık", a: "mı", i: "📔" },
            { t: 13, w: "Süt soğuk", a: "mu", i: "🥛" }, { t: 14, w: "Kapı kapalı", a: "mı", i: "🚪" }
        ];
        let step = 0; let pool = [];

        function start() {
            pool = [...data].sort(() => Math.random() - 0.5);
            render();
        }

        function render() {
            if (step >= pool.length) {
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('done').style.display = 'block';
                return;
            }
            const item = pool[step];
            const box = document.getElementById('box');
            box.classList.remove('win');
            box.innerHTML = item.w + " " + item.i + " ...?<br><small style='font-size:12px;color:gray'>🔊 Tıkla ve Dinle</small>";
            document.getElementById('prog').innerText = (step + 1) + " / " + pool.length;
            document.getElementById('fb').innerText = "";
        }

        function playVoice() {
            audioFile.currentTime = pool[step].t;
            audioFile.play();
            setTimeout(() => { audioFile.pause(); }, 1400);
        }

        function check(ans) {
            if (ans === pool[step].a) {
                document.getElementById('fb').style.color = "green";
                document.getElementById('fb').innerText = "Doğru! ✅";
                document.getElementById('box').classList.add('win');
                playVoice();
                step++;
                setTimeout(render, 1800);
            } else {
                document.getElementById('fb').style.color = "red";
                document.getElementById('fb').innerText = "Yanlış! ❌";
            }
        }
        start();
    </script>
</body>
</html>
