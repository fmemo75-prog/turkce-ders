<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locative Case | Fatih Mehmet CANITEZ</title>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --turkish: #e74c3c; --green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: var(--turkish); font-size: 20px; margin: 10px 0; }
        .rule { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; }
        .word-display { font-size: 22px; font-weight: bold; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { padding: 15px; font-size: 20px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 12px; cursor: pointer; }
        .btn-start { display: block; width: 100%; padding: 18px; background: var(--green); color: white; border-radius: 15px; font-weight: bold; text-decoration: none; border: none; cursor: pointer; }
        #feedback { margin-top: 15px; font-weight: bold; }
        .footer-contact { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="card">
    <div style="text-align:left"><a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">🏠 HOME</a></div>
    <div id="lesson">
        <h1>Bulunma Hâli (Locative)</h1>
        <div class="rule">Last Vowel a,ı,o,u → <b>-da/-ta</b><br>Last Vowel e,i,ö,ü → <b>-de/-te</b></div>
        <button class="btn-start" onclick="start()">START TEST 🎯</button>
    </div>
    <div id="quiz" style="display:none">
        <div id="prog" style="text-align:right; font-size:11px; color:#aaa">1 / 10</div>
        <div style="font-size:50px" id="q-emoji">🪑</div>
        <div class="word-display" id="q-text">...</div>
        <div class="grid" id="btn-container"></div>
        <div id="feedback"></div>
    </div>
    <div class="footer-contact">
        <a href="https://wa.me/905054466760" target="_blank" style="color:var(--green); text-decoration:none; font-weight:bold;">💬 WhatsApp: Fatih Hoca</a>
    </div>
</div>
<script>
    const data = [{q:"Kitabım masa___ kaldı.",a:"-da",o:["-da","-ta"],i:"🪑",t:"On the table"},{q:"Ali mutfak___ yemek yapıyor.",a:"-ta",o:["-da","-ta"],i:"🍳",t:"In the kitchen"},{q:"Cüzdanımı park___ düşürdüm.",a:"-ta",o:["-da","-ta"],i:"🌲",t:"In the park"},{q:"Sizin ev___ kedi var mı?",a:"-de",o:["-de","-te"],i:"🏠",t:"In the house"},{q:"Öğrenciler sınıf___ çalışıyor.",a:"-ta",o:["-da","-ta"],i:"🏫",t:"In the classroom"},{q:"Anahtar dolap___ duruyor.",a:"-ta",o:["-da","-ta"],i:"🗄️",t:"In the cabinet"},{q:"Dün akşam iş___ çok yoruldum.",a:"-te",o:["-de","-te"],i:"💼",t:"At work"},{q:"Telefonum yatak___ kalmış.",a:"-ta",o:["-da","-ta"],i:"🛏️",t:"On the bed"},{q:"Çocuklar sokak___ oynuyor.",a:"-ta",o:["-da","-ta"],i:"🛣️",t:"In the street"},{q:"Muğla___ tatil yapacağız.",a:"-da",o:["-da","-ta"],i:"📍",t:"In Muğla"}];
    let step=0; let pool=[];
    function speak(t){window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='tr-TR'; window.speechSynthesis.speak(m);}
    function start(){document.getElementById('lesson').style.display='none'; document.getElementById('quiz').style.display='block'; pool=[...data].sort(()=>Math.random()-0.5); show();}
    function show(){if(step>=pool.length){document.getElementById('quiz').innerHTML=`<h2>Tebrikler! 🎉</h2><a href="index.html" class="btn-start" style="text-align:center; text-decoration:none">ANA SAYFA</a>`; return;} const item=pool[step]; document.getElementById('q-emoji').innerText=item.i; document.getElementById('q-text').innerHTML=`${item.q.replace('___','<b>___</b>')}<br><small style="font-weight:normal;color:gray">(${item.t})</small>`; document.getElementById('prog').innerText=`${step+1} / 10`; document.getElementById('feedback').innerText=""; const c=document.getElementById('btn-container'); c.innerHTML=''; item.o.forEach(o=>{const b=document.createElement('button'); b.className='btn-opt'; b.innerText=o; b.onclick=()=>check(o); c.appendChild(b);}); speak(item.q.replace('___',''));}
    function check(ans){if(ans===pool[step].a){document.getElementById('feedback').style.color="green"; document.getElementById('feedback').innerText="Correct! ✅"; speak(pool[step].q.replace('___',pool[step].a)); step++; setTimeout(show,2500);} else {document.getElementById('feedback').style.color="red"; document.getElementById('feedback').innerText="Wrong! ❌";}}
</script>
</body>
</html>
