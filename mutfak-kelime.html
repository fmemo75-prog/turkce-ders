<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Turkish: Picture Dictionary & Quiz</title>
    <style>
        :root { --primary: #e67e22; --success: #27ae60; --error: #c0392b; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Study Card Styles */
        .dictionary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .study-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
        .study-emoji { font-size: 30px; }
        .study-name { font-weight: bold; margin: 5px 0; color: var(--primary); }
        .listen-btn { background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 14px; }

        /* Quiz Styles */
        .quiz-target { background: #fdf2e9; border: 3px solid var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 26px; font-weight: bold; color: #d35400; }
        .emoji-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .emoji-btn { background: white; border: 2px solid #ddd; padding: 20px; border-radius: 15px; font-size: 40px; cursor: pointer; transition: 0.2s; }
        .emoji-btn:active { transform: scale(0.9); }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { background: var(--success); width: 0%; height: 100%; transition: 0.3s; }
        
        .footer { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; font-size: 14px; }
        .home-link { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- EKRAN 1: RESİMLİ SÖZLÜK (Study Mode) -->
    <div id="study-screen">
        <h2 style="color:var(--primary); margin-top:0;">📖 Picture Dictionary</h2>
        <p style="color:#666; font-size: 14px;">First, listen and learn the words!</p>
        
        <div class="dictionary-grid" id="dictionary-list">
            <!-- JS ile dolacak -->
        </div>

        <button class="btn-main" onclick="startQuiz()">I'M READY! START QUIZ 🚀</button>
    </div>

    <!-- EKRAN 2: TEST (Quiz Mode) -->
    <div id="quiz-screen" style="display:none;">
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        <p style="color:#666; font-size: 14px; margin-bottom:5px;">Find the object:</p>
        <div class="quiz-target" id="target-word">Buzdolabı</div>

        <div class="emoji-grid" id="quiz-options">
            <!-- Sadece emojiler buraya gelecek -->
        </div>
        <div id="feedback" style="margin-top:15px; font-weight:bold; height:20px;"></div>
    </div>

    <!-- EKRAN 3: SONUÇ -->
    <div id="result-screen" style="display:none;">
        <h2 style="color:var(--success)">Tebrikler! 🏆</h2>
        <p>You have learned the kitchen vocabulary.</p>
        <button class="btn-main" onclick="location.reload()">RESTART</button>
    </div>

    <div class="footer">
        <a href="https://wa.me/905054466760" style="color:green; text-decoration:none; font-weight:bold;">WhatsApp: +90 505 446 67 60</a><br><br>
        <a href="index.html" class="home-link">🏠 Ana Sayfaya Dön</a>
    </div>
</div>

<script>
    const data = [
        { name: "Buzdolabı", emoji: "🧊" },
        { name: "Fırın", emoji: "🔥" },
        { name: "Tabak", emoji: "🍽️" },
        { name: "Bardak", emoji: "🥛" },
        { name: "Çatal", emoji: "🍴" },
        { name: "Kaşık", emoji: "🥄" },
        { name: "Ekmek", emoji: "🍞" },
        { name: "Tava", emoji: "🍳" },
        { name: "Bıçak", emoji: "🔪" }
    ];

    let step = 0;
    let quizData = [];

    // Sayfa Yüklendiğinde Sözlüğü Oluştur
    function init() {
        const list = document.getElementById('dictionary-list');
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'study-card';
            card.innerHTML = `
                <span class="study-emoji">${item.emoji}</span>
                <span class="study-name">${item.name}</span>
                <button class="listen-btn" onclick="playVoice('${item.name}')">🔊</button>
            `;
            list.appendChild(card);
        });
    }

    function startQuiz() {
        document.getElementById('study-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        quizData = [...data].sort(() => Math.random() - 0.5);
        loadQuestion();
    }

    function loadQuestion() {
        const correct = quizData[step];
        document.getElementById('target-word').innerText = correct.name;
        document.getElementById('feedback').innerText = "";
        document.getElementById('p-fill').style.width = (step / quizData.length) * 100 + "%";

        const optionsBox = document.getElementById('quiz-options');
        optionsBox.innerHTML = "";

        // Şıkları karıştır (Sadece Emojiler)
        let choices = [...data].sort(() => Math.random() - 0.5).slice(0, 6);
        if(!choices.find(c => c.name === correct.name)) choices[0] = correct;
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(obj => {
            const btn = document.createElement('button');
            btn.className = 'emoji-btn';
            btn.innerText = obj.emoji;
            btn.onclick = () => check(obj.name, correct.name, btn, correct.name);
            optionsBox.appendChild(btn);
        });
    }

    function check(selected, correct, btn, voice) {
        const f = document.getElementById('feedback');
        if(selected === correct) {
            btn.style.borderColor = "var(--success)";
            btn.style.backgroundColor = "#e8f5e9";
            f.innerText = "Doğru! ✅";
            f.style.color = "var(--success)";
            playVoice(voice); // Doğru cevapta ses oku

            setTimeout(() => {
                step++;
                if(step < quizData.length) loadQuestion();
                else {
                    document.getElementById('quiz-screen').style.display = 'none';
                    document.getElementById('result-screen').style.display = 'block';
                }
            }, 1800);
        } else {
            btn.style.borderColor = "var(--error)";
            btn.style.backgroundColor = "#ffebee";
            f.innerText = "Yanlış! ❌";
            f.style.color = "var(--error)";
        }
    }

    function playVoice(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'tr-TR';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    init();
</script>
</body>
</html>
