<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CBK2NC3T9X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CBK2NC3T9X');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root { --turkish: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #fb-warn { display: none; background: #ffeb3b; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #fbc02d; position: sticky; top: 0; z-index: 9999; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--turkish); }
        header { background: #2c3e50; padding: 15px; text-align: center; color: white; }
        footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
        .lesson-body html, .lesson-body body { display: contents; }
    </style>
</head>
<body>
    <div id="fb-warn">⚠️ Facebook'ta sesler çalışmayabilir. Lütfen Chrome/Safari ile açın.</div>
    <header><strong>📖 Fatih Mehmet CANITEZ | Eğitim Portalı</strong></header>
    <div class="container lesson-body">
      {{ content }}
    </div>
    <footer>© 2024 | Fatih Mehmet CANITEZ</footer>
    <script>
        if(navigator.userAgent.indexOf("FBAN") > -1 || navigator.userAgent.indexOf("FBAV") > -1) { document.getElementById("fb-warn").style.display = "block"; }
    </script>
</body>
</html>
