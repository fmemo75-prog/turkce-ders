<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatih Mehmet CANITEZ | Turkish for Foreigners</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --turkish: #e74c3c; --whatsapp: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 30px 15px; background: white; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--turkish); }
        .photo-frame { width: 125px; height: 125px; margin: 0 auto 15px; border-radius: 50%; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { margin: 0; font-size: 22px; color: var(--primary); }
        .main-title { color: var(--turkish); font-weight: 800; font-size: 18px; text-transform: uppercase; margin-top: 5px; display: block; }
        
        .contact-box { background: white; padding: 20px; border-radius: 20px; margin: 15px 0; text-align: center; border: 1px solid #eee; }
        .wa-text { font-size: 18px; font-weight: 800; color: var(--whatsapp); text-decoration: none; display: block; }

        .yt-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #FF0000; color: white; text-decoration: none; padding: 18px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(255,0,0,0.2); }
        
        /* Liste Tasarımı */
        #exercise-list { min-height: 200px; }
        .exercise-card { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 15px; text-decoration: none; color: inherit; font-weight: bold; margin-bottom: 10px; border: 1px solid #eee; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .exercise-card:hover { transform: translateX(5px); border-color: var(--accent); }
        .ex-tag { font-size: 10px; color: var(--accent); background: #e1f5fe; padding: 2px 6px; border-radius: 5px; display: block; width: fit-content; margin-bottom: 3px; }
        
        .loading { text-align: center; padding: 40px; color: #999; font-style: italic; }
        .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 20px; }
        .lang-card { background: white; padding: 8px; border-radius: 10px; text-align: center; font-size: 9px; font-weight: bold; border-bottom: 2px solid #ddd; }
        footer { text-align: center; margin-top: 30px; padding: 20px; font-size: 11px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="photo-frame"><img src="fatih-photo.jpg" alt="Fatih CANITEZ"></div>
        <h1>Fatih Mehmet CANITEZ</h1>
        <span class="main-title">TURKISH FOR FOREIGNERS</span>
    </header>

    <div class="contact-box">
        <a href="https://wa.me/905054466760" target="_blank" class="wa-text">🟢 WhatsApp: +90 505 446 67 60</a>
    </div>

    <a href="courses.html" class="yt-btn">📺 YouTube: LESSONS & BOOKS</a>

    <div style="font-size:12px; font-weight:bold; color:#7f8c8d; margin-bottom: 10px; text-transform:uppercase;">Practice Exercises</div>
    
    <!-- DERSLER BURADA OTOMATİK LİSTELENECEK -->
    <div id="exercise-list">
        <div class="loading">Dersler yükleniyor, lütfen bekleyin...</div>
    </div>

    <div class="lang-grid">
        <div class="lang-card">🇹🇷<br>Turkish</div><div class="lang-card">🇫🇷<br>French</div><div class="lang-card">🇮🇹<br>Italian</div><div class="lang-card">🇪🇸<br>Spanish</div>
    </div>
    <footer>© 2024 Multi-Language Academy</footer>
</div>

<script>
    // Google Sheets CSV Export Link (Senin tablon için hazırlandı)
    const sheetID = "1z2a9QpIPGiUoObHqfioTgo_laXXKMP5e3n0pRJA7XcA";
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

    async function loadLessons() {
        try {
            const response = await fetch(csvUrl);
            const csvData = await response.text();
            
            // Satırları ayır ve boş satırları temizle
            const rows = csvData.split('\n').map(row => row.trim()).filter(row => row.length > 0);
            
            const listDiv = document.getElementById('exercise-list');
            listDiv.innerHTML = ""; // Yükleniyor yazısını kaldır

            // İlk satır başlık olduğu için i=1'den başlıyoruz
            for (let i = 1; i < rows.length; i++) {
                // Virgülle ayrılmış sütunları al (Tırnak içindeki virgülleri korur)
                const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 2) {
                    const title = columns[0].replace(/"/g, ""); // Başlık
                    const url = columns[1].replace(/"/g, "");   // Link
                    const icon = columns[2] ? columns[2].replace(/"/g, "") : "📝"; // Emoji

                    listDiv.innerHTML += `
                        <a href="${url}" class="exercise-card">
                            <div>
                                <span class="ex-tag">EXERCISE ${i}</span>
                                <span>${icon} ${title}</span>
                            </div>
                            <span>🔊</span>
                        </a>
                    `;
                }
            }
        } catch (error) {
            console.error("Hata:", error);
            document.getElementById('exercise-list').innerHTML = "<p style='text-align:center; color:red;'>Dersler şu an yüklenemedi. Lütfen 'Web'de Yayınla' ayarını kontrol edin.</p>";
        }
    }

    // Sayfa açıldığında dersleri getir
    window.onload = loadLessons;
</script>
</body>
</html>
