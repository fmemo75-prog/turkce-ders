<!-- Google Sheets Script -->
<script>
    const spreadsheetId = '1z2a9QpIPGiUoObHqfioTgo_laXXKMP5e3n0pRJA7XcA';
    const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json`;

    async function loadData() {
        const listDiv = document.getElementById('exercise-list');
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;

            if (rows && rows.length > 0) {
                listDiv.innerHTML = "";
                rows.forEach((row, index) => {
                    const title = row.c[0] ? row.c[0].v : "Untitled";
                    const link = row.c[1] ? row.c[1].v : "#";
                    const icon = row.c[2] ? row.c[2].v : "📝";
                    listDiv.innerHTML += `
                        <a href="${link}" style="display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 15px; text-decoration: none; color: inherit; font-weight: bold; margin-bottom: 10px; border: 1px solid #eee;">
                            <div><span style="font-size:10px; color:#3498db; display:block;">EXERCISE ${index + 1}</span><span>${icon} ${title}</span></div>
                            <span>🔊</span>
                        </a>`;
                });
            }
        } catch (e) { listDiv.innerHTML = "Error loading data."; }
    }
    window.onload = loadData;
</script>
