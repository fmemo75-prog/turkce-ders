<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatih Mehmet CANITEZ | Turkish for Foreigners</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --turkish: #e74c3c; --whatsapp: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 30px 15px; background: white; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--turkish); }
        .photo-frame { width: 120px; height: 120px; margin: 0 auto 15px; border-radius: 50%; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { margin: 0; font-size: 22px; color: var(--primary); font-weight: bold; }
        .main-title { color: var(--turkish); font-weight: 800; font-size: 18px; text-transform: uppercase; margin-top: 5px; display: block; }
        .wa-box { background: white; padding: 15px; border-radius: 20px; margin: 15px 0; text-align: center; border: 1px solid #eee; }
        .yt-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #FF0000; color: white; text-decoration: none; padding: 18px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; }
        .exercise-card { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 15px; text-decoration: none; color: inherit; font-weight: bold; margin-bottom: 10px; border: 1px solid #eee; }
        .ex-tag { font-size: 10px; color: var(--accent); background: #e1f5fe; padding: 2px 6px; border-radius: 5px; display: block; width: fit-content; margin-bottom: 3px; }
        footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 11px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="photo-frame"><img src="fatih-photo.jpg" alt="Fatih CANITEZ"></div>
        <h1>Fatih Mehmet CANITEZ</h1>
        <span class="main-title">TURKISH FOR FOREIGNERS</span>
    </header>

    <div class="wa-box">
        <a href="https://wa.me/905054466760" target="_blank" style="color:var(--whatsapp); text-decoration:none; font-weight:bold; font-size:18px;">🟢 WhatsApp: +90 505 446 67 60</a>
    </div>

    <a href="courses.html" class="yt-btn">📺 YouTube: LESSONS & BOOKS</a>

    <div style="font-size:12px; font-weight:bold; color:#7f8c8d; margin-bottom: 10px; text-transform:uppercase;">Practice Exercises</div>
    
    <!-- Liste Alanı -->
    <div id="exercise-list">
        <div style="text-align:center; padding:20px; color:#999;">Dersler yükleniyor...</div>
    </div>

    <footer>© 2024 Multi-Language Academy</footer>
</div>

<script>
    // Ekran görüntüsündeki linki tam olarak buraya ekledim
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3zbRr2lyKOUOWI5VO7AjVKLpTJrBC1h7L6XKMobwFHCjjdFfxBLKcKJlaHzncLNA9UQ6I-W_6DAAX/pub?gid=0&single=true&output=csv';

    async function loadLessons() {
        const listDiv = document.getElementById('exercise-list');
        try {
            // Cache (önbellek) sorununu aşmak için linke ufak bir rastgele sayı ekliyoruz
            const response = await fetch(csvUrl + '&cache=' + Math.random());
            if (!response.ok) throw new Error("Google Tablo bağlantısı başarısız.");
            
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
            
            if (rows.length === 0) {
                listDiv.innerHTML = "<div style='text-align:center; padding:20px;'>Henüz ders eklenmemiş.</div>";
                return;
            }

            listDiv.innerHTML = ""; 

            rows.forEach((row, i) => {
                // CSV'deki virgülleri ayırır (Tırnak içindeki virgülleri bozmaz)
                const parts = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (parts.length >= 2) {
                    const title = parts[0].replace(/"/g, "").trim();
                    const url = parts[1].replace(/"/g, "").trim();
                    const icon = parts[2] ? parts[2].replace(/"/g, "").trim() : "📝";

                    listDiv.innerHTML += `
                        <a href="${url}" class="exercise-card">
                            <div>
                                <span class="ex-tag">EXERCISE ${i + 1}</span>
                                <span>${icon} ${title}</span>
                            </div>
                            <span>🔊</span>
                        </a>`;
                }
            });
        } catch (error) {
            console.error("Hata detayı:", error);
            listDiv.innerHTML = "<div style='text-align:center; color:red; padding:20px;'>Hata: Veriler alınamadı. Lütfen sayfayı yenileyin veya Google Tablo 'Yayınla' ayarlarını kontrol edin.</div>";
        }
    }

    // Sayfa yüklenince çalıştır
    window.onload = loadLessons;
</script>
</body>
</html>
