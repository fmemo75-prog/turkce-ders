<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Present Continuous (-yor) | Fatih Mehmet CANITEZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --red: #e74c3c; --green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--blue); }
        .q-img { width: 100%; max-width: 250px; height: 180px; object-fit: contain; border-radius: 20px; margin-bottom: 15px; }
        .sentence { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .btn-opt { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; font-weight: bold; border: 2px solid var(--blue); background: white; color: var(--blue); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-opt:hover { background: var(--blue); color: white; }
        #fb { font-weight: bold; font-size: 20px; margin-top: 15px; }
        #starter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="starter">
    <h1>Şimdiki Zaman (-yor)</h1>
    <button onclick="document.getElementById('starter').style.display='none'; window.speechSynthesis.cancel();" style="padding:20px 40px; background:var(--green); color:white; border:none; border-radius:15px; font-size:20px; cursor:pointer;">BAŞLAT / START</button>
</div>

<div class="card">
    <div style="text-align:left; margin-bottom:10px;"><a href="index.html" style="text-decoration:none; color:var(--blue); font-weight:bold;">🏠 HOME</a></div>
    <div id="prog" style="text-align:right; color:gray; font-size:12px;">1 / 10</div>
    <img id="q-img" class="q-img" src="https://img.freepik.com/free-vector/flat-world-book-day-illustration_23-2148875560.jpg">
    <div class="sentence" id="q-text">Ben kitap .......</div>
    <div id="options"></div>
    <div id="fb"></div>
</div>

<script>
    const data = [
        { p: "Ben", obj: "kitap", verb: "okuyorum", img: "https://img.freepik.com/free-vector/flat-world-book-day-illustration_23-2148875560.jpg" },
        { p: "Sen", obj: "su", verb: "içiyorsun", img: "https://img.freepik.com/free-vector/thirsty-concept-illustration_114360-7053.jpg" },
        { p: "O", obj: "elma", verb: "yiyor", img: "https://img.freepik.com/free-vector/eating-healthy-food-concept-illustration_114360-2235.jpg" }
    ];
    let step = 0;
    function show() {
        const item = data[step];
        document.getElementById('q-img').src = item.img;
        document.getElementById('q-text').innerHTML = `${item.p} ${item.obj} <b style="color:var(--red)">.......</b>`;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        [item.verb, "okuyoruz", "içiyor"].sort().forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = () => {
                if(o === item.verb) {
                    document.getElementById('fb').innerHTML = "Correct! ✅";
                    step++;
                    setTimeout(() => { if(step < data.length) show(); else alert("Finish!"); }, 1500);
                } else {
                    document.getElementById('fb').innerHTML = "Try again! ❌";
                }
            };
            optDiv.appendChild(b);
        });
    }
    show();
</script>
</body>
</html>
